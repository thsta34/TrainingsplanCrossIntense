name: Supabase heartbeat

on:
  schedule:
    - cron: "17 */8 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: https://tnhwyrapdsqoklenzwjn.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_l6CdhfG_yUH1Nb9JsjhrkA_8HbDKRYX
        run: |
          curl --fail --show-error --silent \
            "${SUPABASE_URL}/rest/v1/training_app_states?select=user_id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Accept: application/json"
